# Docker Compose configuration for Poker Results Tracker
services:
  # Backend NestJS application
  nestapp:
    container_name: poker-nestapp
    build:
      context: ./be
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    expose:
      - "3000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_NAME=${POSTGRES_NAME:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_HOST=postgres
      - NEST_HOST=0.0.0.0
      - NEST_PORT=3000
      - CLIENT_HOST=${CLIENT_HOST}
      - CLIENT_PORT=${CLIENT_PORT:-443}
      - PASSPORT_SECRET=${PASSPORT_SECRET}
      - NODE_ENV=production
      - DB_SYNCHRONIZE=false
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - poker-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Frontend Vue.js application with Caddy
  vueapp:
    container_name: poker-vueapp
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    ports:
      - "80:80"
    environment:
      - CADDY_HOST=${CADDY_HOST:-:80}
      - CADDY_BACKEND=poker-nestapp:3000
    env_file:
      - .env.prod
    depends_on:
      nestapp:
        condition: service_healthy
    networks:
      - poker-network
    restart: unless-stopped
    volumes:
      - ./fe/Caddyfile:/etc/caddy/Caddyfile
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  cloudflared:
    container_name: poker-cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - poker-network
    depends_on:
      vueapp:
        condition: service_healthy

  # PostgreSQL database
  postgres:
    container_name: poker-postgres-prod
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=${POSTGRES_NAME:-postgres}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - poker-network
    # Add healthcheck for the database
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  poker-network:
    driver: bridge

volumes:
  pgdata-prod:
